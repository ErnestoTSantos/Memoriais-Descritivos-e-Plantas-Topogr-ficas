name: CI and Railway Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DJANGO_DEBUG: "1"
          USE_S3: "0"
        run: python -m pytest -q

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        shell: bash
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN is not configured. Skipping Railway deploy."
            exit 0
          fi

          args=(--ci)

          if [ -n "$RAILWAY_PROJECT_ID" ]; then
            if [ -z "$RAILWAY_ENVIRONMENT" ]; then
              echo "RAILWAY_ENVIRONMENT is required when RAILWAY_PROJECT_ID is set."
              exit 1
            fi
            args+=(--project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT")
          elif [ -n "$RAILWAY_ENVIRONMENT" ]; then
            args+=(--environment "$RAILWAY_ENVIRONMENT")
          fi

          if [ -n "$RAILWAY_SERVICE" ]; then
            args+=(--service "$RAILWAY_SERVICE")
          fi

          railway up "${args[@]}"
